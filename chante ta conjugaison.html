const Confetti = ({ active }) => {
    const [pieces, setPieces] = useState([]);
    useEffect(() => {
        if (active) {
            const colors = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
            const newPieces = Array.from({ length: 40 }, (_, i) => ({
                id: i, left: Math.random() * 100, delay: Math.random() * 2,
                color: colors[Math.floor(Math.random() * colors.length)], size: Math.random() * 8 + 4
            }));
            setPieces(newPieces);
            setTimeout(() => setPieces([]), 3000);
        }
    }, [active]);
    if (!pieces.length) return null;
    return (
        <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
            {pieces.map(p => (
                <div key={p.id} className="confetti"
                    style={{ left: p.left + '%', animationDelay: p.delay + 's', backgroundColor: p.color, width: p.size, height: p.size, borderRadius: Math.random() > 0.5 ? '50%' : '0' }}
                />
            ))}
        </div>
    );
};

const InteractiveGame = ({ songId, onClose, onComplete }) => {
    const game = gameData[songId];
    const [currentQIndex, setCurrentQIndex] = useState(0);
    const [selectedAnswer, setSelectedAnswer] = useState(null);
    const [showFeedback, setShowFeedback] = useState(false);
    const [isCorrect, setIsCorrect] = useState(false);
    const [score, setScore] = useState(0);
    const [showSuccess, setShowSuccess] = useState(false);
    const [shuffledQuestions, setShuffledQuestions] = useState([]);

    useEffect(() => {
        const shuffled = [...game.questions].sort(() => Math.random() - 0.5);
        setShuffledQuestions(shuffled);
        setCurrentQIndex(0); setSelectedAnswer(null); setShowFeedback(false);
        setIsCorrect(false); setScore(0); setShowSuccess(false);
    }, [songId]);

    const currentQuestion = shuffledQuestions[currentQIndex];
    const handleChoice = (choice) => {
        if (showFeedback) return;
        setSelectedAnswer(choice);
        const correct = choice === currentQuestion.correct;
        setIsCorrect(correct); setShowFeedback(true);
        if (correct) setScore(s => s + 1);
    };
    const handleNext = () => {
        if (currentQIndex < shuffledQuestions.length - 1) {
            setCurrentQIndex(i => i + 1); setSelectedAnswer(null); setShowFeedback(false);
        } else {
            setShowSuccess(true);
            if (onComplete) onComplete(score + (isCorrect ? 1 : 0), shuffledQuestions.length);
        }
    };
    const resetGame = () => {
        const shuffled = [...game.questions].sort(() => Math.random() - 0.5);
        setShuffledQuestions(shuffled);
        setCurrentQIndex(0); setSelectedAnswer(null); setShowFeedback(false);
        setIsCorrect(false); setScore(0); setShowSuccess(false);
    };
    const progress = ((currentQIndex + (showFeedback ? 1 : 0)) / (shuffledQuestions.length || 1)) * 100;
    if (!currentQuestion) return null;
    const choices = Math.random() > 0.5 ? [currentQuestion.correct, currentQuestion.wrong] : [currentQuestion.wrong, currentQuestion.correct];

    return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <Confetti active={showSuccess} />
            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
                <div className="bg-gradient-to-r from-blue-500 to-blue-600 rounded-t-3xl p-5 text-white">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><Icon name="Gamepad" size={20} /></div>
                            <div>
                                <h2 className="text-lg font-bold">{game.title}</h2>
                                <p className="text-blue-100 text-xs">Question {currentQIndex + 1} / {shuffledQuestions.length}</p>
                            </div>
                        </div>
                        <button onClick={onClose} className="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center hover:bg-white/30"><span className="text-xl">&times;</span></button>
                    </div>
                </div>
                {showSuccess && (
                    <div className="p-6 text-center">
                        <div className="pop-in">
                            <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Trophy" size={40} className="text-green-500" /></div>
                            <h3 className="text-2xl font-bold text-gray-800 mb-2">Félicitations ! 🎉</h3>
                            <p className="text-gray-600 mb-4">Tu as terminé le jeu !</p>
                            <div className="bg-blue-50 rounded-2xl p-4 mb-4">
                                <div className="text-3xl font-bold text-blue-600 mb-1">{score} / {shuffledQuestions.length}</div>
                                <div className="text-sm text-gray-500">bonnes réponses</div>
                            </div>
                            <div className="flex items-center justify-center gap-1 mb-6">
                                {[1,2,3,4,5].map(i => (<Icon key={i} name="Star" size={28} className={i <= Math.round((score / shuffledQuestions.length) * 5) ? "text-yellow-400 star-fill" : "text-gray-300"} />))}
                            </div>
                            <div className="flex gap-3 justify-center">
                                <button onClick={resetGame} className="px-5 py-2.5 bg-blue-500 text-white rounded-xl font-semibold hover:bg-blue-600 transition-colors flex items-center gap-2"><Icon name="RotateCcw" size={16} />Rejouer</button>
                                <button onClick={onClose} className="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200 transition-colors">Fermer</button>
                            </div>
                        </div>
                    </div>
                )}
                {!showSuccess && (
                    <div className="p-5">
                        <div className="mb-5">
                            <div className="flex justify-between text-xs text-gray-500 mb-1.5"><span>Progression</span><span>{Math.round(progress)}%</span></div>
                            <div className="w-full bg-gray-200 rounded-full h-2.5"><div className="progress-bar-fill bg-blue-500 h-2.5 rounded-full" style={{ width: progress + '%' }} /></div>
                        </div>
                        <div className="bg-blue-50 rounded-xl p-3 mb-5 border border-blue-100"><p className="text-blue-800 text-sm font-medium text-center">{game.instructions}</p></div>
                        <div className="text-center mb-6">
                            <div className="inline-block bg-gradient-to-r from-blue-50 to-purple-50 rounded-2xl px-6 py-4 mb-4 border-2 border-blue-100">
                                <p className="text-lg font-bold text-gray-800 leading-relaxed">
                                    {currentQuestion.phrase.split('___').map((part, idx, arr) => (<span key={idx}>{part}{idx < arr.length - 1 && (<span className="inline-block mx-1 px-3 py-1 bg-blue-200 rounded-lg text-blue-800 border-2 border-blue-300 border-dashed">?</span>)}</span>))}
                                </p>
                            </div>
                            <p className="text-gray-500 text-sm">Choisis la bonne forme :</p>
                        </div>
                        <div className="grid grid-cols-2 gap-4 mb-5">
                            {choices.map((choice, idx) => {
                                let btnClass = "choice-btn py-4 px-4 rounded-2xl border-2 font-bold text-lg text-center ";
                                if (showFeedback) {
                                    if (choice === currentQuestion.correct) btnClass += "correct pulse-green";
                                    else if (choice === selectedAnswer) btnClass += "wrong pulse-red";
                                    else btnClass += "bg-gray-100 border-gray-200 text-gray-400";
                                } else {
                                    btnClass += selectedAnswer === choice ? "selected bg-blue-100 border-blue-400 text-blue-700" : "bg-white border-blue-200 text-blue-700 hover:bg-blue-50 hover:border-blue-300";
                                }
                                return (<button key={idx} onClick={() => handleChoice(choice)} disabled={showFeedback} className={btnClass}>{choice}</button>);
                            })}
                        </div>
                        {showFeedback && (
                            <div className={`slide-up mb-5 p-4 rounded-xl text-center ${isCorrect ? 'bg-green-100' : 'bg-red-100'}`}>
                                <div className="flex items-center justify-center gap-2 mb-2">
                                    {isCorrect ? (<><Icon name="CheckCircle" size={24} className="text-green-600" /><span className="font-bold text-green-700 text-lg">Bravo ! 🎉</span></>) : (<><Icon name="XCircle" size={24} className="text-red-600" /><span className="font-bold text-red-700 text-lg">Essaye encore ! 💪</span></>)}
                                </div>
                                <p className={`text-sm ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>{currentQuestion.explanation}</p>
                                <button onClick={handleNext} className={`mt-3 px-6 py-2 rounded-xl font-bold text-white transition-colors ${isCorrect ? 'bg-green-500 hover:bg-green-600' : 'bg-red-500 hover:bg-red-600'}`}>{currentQIndex < shuffledQuestions.length - 1 ? 'Question suivante →' : 'Voir le résultat 🏆'}</button>
                            </div>
                        )}
                        <div className="flex items-center justify-between pt-3 border-t border-gray-100">
                            <div className="text-sm text-gray-500">Score: <span className="font-bold text-blue-600">{score}</span> / {shuffledQuestions.length}</div>
                            <button onClick={resetGame} className="flex items-center gap-1.5 text-sm text-gray-400 hover:text-blue-500 transition-colors"><Icon name="RotateCcw" size={14} />Recommencer</button>
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
};

const VideoPlayer = ({ song, isOpen, onClose, isPlaying, onToggle, onRestart }) => {
    const videoRef = useRef(null);
    const [videoTime, setVideoTime] = useState(0);
    const [videoDur, setVideoDur] = useState(0);

    const isFaire = song && song.id === 'n2-2';
    const videoSrc = isFaire ? 'faire.mp4' : null;

    const fmt = (s) => {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + sec.toString().padStart(2, '0');
    };

    useEffect(() => {
        const v = videoRef.current;
        if (!v || !videoSrc) return;
        if (isPlaying) {
            v.play().catch(err => console.log('Video play blocked:', err));
        } else {
            v.pause();
        }
    }, [isPlaying, videoSrc]);

    useEffect(() => {
        if (!isOpen && videoRef.current) {
            videoRef.current.pause();
            videoRef.current.currentTime = 0;
        }
    }, [isOpen]);

    if (!isOpen || !song) return null;
    const progress = videoDur ? (videoTime / videoDur) * 100 : 0;

    return (
        <div className="fixed inset-0 bg-black z-[60] flex flex-col">
            <div className="absolute top-0 left-0 right-0 z-10 p-4">
                <div className="flex items-center justify-between">
                    <button onClick={onClose}
                        className="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center hover:bg-white/30">
                        <Icon name="ChevronLeft" size={20} className="text-white" />
                    </button>
                    <div className="text-center">
                        <h3 className="text-white font-bold text-lg drop-shadow-lg">{song.title}</h3>
                        <p className="text-white/70 text-xs">🎬 Mode Vidéo</p>
                    </div>
                    <div className="w-10" />
                </div>
            </div>

            <div className="flex-1 flex items-center justify-center bg-black">
                {videoSrc ? (
                    <video
                        ref={videoRef}
                        src={videoSrc}
                        className="w-full h-full object-contain"
                        onTimeUpdate={(e) => setVideoTime(e.target.currentTime)}
                        onLoadedMetadata={(e) => setVideoDur(e.target.duration)}
                        onEnded={onToggle}
                        playsInline
                        preload="auto"
                    />
                ) : (
                    <div className="text-white text-center">
                        <Icon name="Music" size={60} className="text-white/30 mx-auto mb-4" />
                        <p className="text-white/50">Vidéo non disponible pour cette chanson</p>
                    </div>
                )}
            </div>

            <div className="absolute bottom-0 left-0 right-0 z-10 p-4 pb-8">
                <div className="mb-4 px-2">
                    <div className="w-full bg-white/20 rounded-full h-1.5 cursor-pointer"
                        onClick={(e) => {
                            const rect = e.currentTarget.getBoundingClientRect();
                            const newTime = ((e.clientX - rect.left) / rect.width) * videoDur;
                            if (videoRef.current) videoRef.current.currentTime = newTime;
                        }}>
                        <div className="bg-gradient-to-r from-blue-400 to-purple-400 h-1.5 rounded-full transition-all"
                            style={{ width: progress + '%' }} />
                    </div>
                    <div className="flex justify-between text-xs text-white/60 mt-1.5">
                        <span>{fmt(videoTime)}</span>
                        <span>{fmt(videoDur)}</span>
                    </div>
                </div>
                <div className="flex items-center justify-center gap-6">
                    <button onClick={() => { if(videoRef.current) videoRef.current.currentTime = 0; }}
                        className="w-12 h-12 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center hover:bg-white/20">
                        <Icon name="RotateCcw" size={20} className="text-white" />
                    </button>
                    <button onClick={onToggle}
                        className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all">
                        {isPlaying ? 
                            <Icon name="Pause" size={32} className="text-blue-600" /> : 
                            <Icon name="Play" size={32} className="text-blue-600 ml-1" />}
                    </button>
                </div>
            </div>
        </div>
    );
};

                        <Icon name="Gamepad" size={16} />
                        🎮 Jouer au jeu interactif !
                        <Icon name="ArrowRight" size={14} />
                    </button>
                </div>
            )}
        </div>
    );
};

const LevelCard = ({ level, data, onClick }) => {
    return (
        <button onClick={() => onClick(level)}
            className={'level-card w-full ' + data.color + ' rounded-3xl p-6 shadow-md hover:shadow-xl border-2 ' + data.borderColor + ' text-left relative overflow-hidden'}>
            <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-20 rounded-full -mr-10 -mt-10"></div>
            <div className="relative z-10">
                <div className="flex items-center justify-between">
                    <div className="text-left">
                        <h2 className="text-2xl font-bold text-gray-800">{data.title}</h2>
                        <p className="text-gray-600 mt-1 font-medium text-sm">{data.subtitle}</p>
                        <div className="flex items-center gap-2 mt-3">
                            <Icon name="Music" size={18} className={data.iconColor} />
                            <span className="text-sm text-gray-600 font-medium">{data.songs.length} chansons</span>
                            <span className="text-xs bg-white/60 px-2 py-0.5 rounded-full text-gray-600">{data.songs.length} jeux</span>
                        </div>
                    </div>
                    <div className={'w-16 h-16 rounded-full bg-white flex items-center justify-center shadow-lg border-4 ' + data.borderColor}>
                        <span className="text-3xl font-bold text-gray-700">{level}</span>
                    </div>
                </div>
            </div>
        </button>
    );
};

const App = () => {
    const [currentView, setCurrentView] = useState('home');
    const [selectedLevel, setSelectedLevel] = useState(null);
    const [searchQuery, setSearchQuery] = useState('');
    const [playingSong, setPlayingSong] = useState(null);
    const [isPlaying, setIsPlaying] = useState(false);
    const [currentTime, setCurrentTime] = useState(0);
    const [duration, setDuration] = useState(0);
    const [activeGame, setActiveGame] = useState(null);
    const [expandedSong, setExpandedSong] = useState(null);
    const [totalScore, setTotalScore] = useState(0);
    const [gamesCompleted, setGamesCompleted] = useState(0);
    const [videoPlayerOpen, setVideoPlayerOpen] = useState(false);
    const [videoSong, setVideoSong] = useState(null);
    const intervalRef = useRef(null);

    const parseDuration = (durationStr) => {
        const parts = durationStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    };

    useEffect(() => {
        if (isPlaying && playingSong && playingSong.id !== 'n2-2') {
            intervalRef.current = setInterval(() => {
                setCurrentTime(prev => {
                    const songDuration = parseDuration(playingSong.duration);
                    if (prev >= songDuration) {
                        setIsPlaying(false);
                        return 0;
                    }
                    return prev + 1;
                });
            }, 1000);
        } else {
            clearInterval(intervalRef.current);
        }
        return () => clearInterval(intervalRef.current);
    }, [isPlaying, playingSong]);

    const handleLevelClick = (level) => {
        setSelectedLevel(level); setCurrentView('level');
        setPlayingSong(null); setIsPlaying(false); setCurrentTime(0); setExpandedSong(null);
        window.scrollTo(0, 0);
    };
    const handleBackToHome = () => {
        setCurrentView('home'); setSelectedLevel(null);
        setPlayingSong(null); setIsPlaying(false); setCurrentTime(0); setExpandedSong(null);
        window.scrollTo(0, 0);
    };
    const handlePlayToggle = (song) => {
        if (playingSong && playingSong.id === song.id) {
            setIsPlaying(!isPlaying);
        } else {
            setPlayingSong(song); setIsPlaying(true); setCurrentTime(0);
            setDuration(parseDuration(song.duration));
        }
    };
    const handleExpandSong = (songId) => { setExpandedSong(expandedSong === songId ? null : songId); };
    const handlePlayGame = (songId) => {
        setActiveGame(songId);
        setIsPlaying(false);
    };
    const handlePlayVideo = (song) => {
        setVideoSong(song);
        setVideoPlayerOpen(true);
        setPlayingSong(song);
        setIsPlaying(true);
        setCurrentTime(0);
        setDuration(parseDuration(song.duration));
    };
    const handleCloseVideo = () => {
        setVideoPlayerOpen(false);
        setVideoSong(null);
        setIsPlaying(false);
        setCurrentTime(0);
    };
    const handleVideoToggle = () => {
        setIsPlaying(!isPlaying);
    };
    const handleVideoRestart = () => {
        setCurrentTime(0);
        setIsPlaying(true);
    };
    const handleGameComplete = (score, total) => {
        setTotalScore(prev => prev + score);
        setGamesCompleted(prev => prev + 1);
    };
    const getFilteredSongs = () => {
        if (!searchQuery) return [];
        const allSongs = [];
        Object.entries(levelsData).forEach(([level, data]) => {
            data.songs.forEach(song => {
                if (song.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    song.lyrics.toLowerCase().includes(searchQuery.toLowerCase())) {
                    allSongs.push(Object.assign({}, song, { level: data.title }));
                }
            });
        });
        return allSongs;
    };
    const filteredSongs = getFilteredSongs();

    return (
        <div className="min-h-screen bg-gradient-to-b from-blue-50 via-white to-blue-50 font-sans">
            <VideoPlayer
                song={videoSong}
                isOpen={videoPlayerOpen}
                onClose={handleCloseVideo}
                isPlaying={isPlaying}
                onToggle={handleVideoToggle}
                onRestart={handleVideoRestart}
                currentTime={currentTime}
                duration={duration}
            />
            {activeGame && (
                <InteractiveGame
                    songId={activeGame}
                    onClose={() => setActiveGame(null)}
                    onComplete={handleGameComplete}
                />
            )}
            <header className="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b border-blue-100">
                <div className="max-w-2xl mx-auto px-4 py-3">
                    <div className="flex items-center justify-between">
                        {currentView === 'level' ? (
                            <button onClick={handleBackToHome}
                                className="flex items-center gap-2 text-blue-500 hover:text-blue-700 transition-colors font-semibold text-sm">
                                <Icon name="ChevronLeft" size={20} />
                                <span>Retour</span>
                            </button>
                        ) : (
                            <div className="flex items-center gap-2.5"></div>
                        )}
                        {gamesCompleted > 0 && (
                            <div className="flex items-center gap-1.5 bg-yellow-100 px-2.5 py-1 rounded-full">
                                <Icon name="Trophy" size={14} className="text-yellow-600" />
                                <span className="text-xs font-bold text-yellow-700">{totalScore}</span>
                            </div>
                        )}
                    </div>
                </div>
            </header>
            <main className="max-w-2xl mx-auto px-4 py-5">
                {currentView === 'home' && (
                    <div>
                        <div className="text-center mb-6 animate-bounce-slow">
                            <div className="inline-block bg-blue-100 rounded-full p-3 mb-3 shadow-inner">
                                <Icon name="Music" size={40} className="text-blue-500" />
                            </div>
                            <h1 className="text-2xl font-bold text-gray-800 mb-1">Chante ta Conjugaison </h1>
                            <p className="text-gray-600 text-base">Apprends la conjugaison en chantant !</p>
                            {gamesCompleted > 0 && (
                                <div className="mt-3 inline-flex items-center gap-3 bg-white rounded-xl px-4 py-2 shadow-md border border-blue-100">
                                    <div className="text-center">
                                        <div className="text-xl font-bold text-blue-600">{gamesCompleted}</div>
                                        <div className="text-[10px] text-gray-500">jeux</div>
                                    </div>
                                    <div className="w-px h-6 bg-gray-200"></div>
                                    <div className="text-center">
                                        <div className="text-xl font-bold text-green-600">{totalScore}</div>
                                        <div className="text-[10px] text-gray-500">points</div>
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="relative mb-6">
                            <Icon name="Search" size={18} className="absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400" />
                            <input
                                type="text"
                                placeholder="Rechercher une chanson..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full pl-10 pr-4 py-3 rounded-xl border-2 border-blue-100 focus:border-blue-300 focus:outline-none text-base shadow-sm transition-all"
                            />
                        </div>
                        {searchQuery && (
                            <div className="mb-6">
                                <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                                    <Icon name="Search" size={18} />
                                    Résultats
                                </h2>
                                {filteredSongs.length === 0 ? (
                                    <div className="text-center py-6 bg-white rounded-xl border-2 border-dashed border-gray-200">
                                        <Icon name="Music" size={40} className="text-gray-300 mx-auto mb-2" />
                                        <p className="text-gray-500 text-sm">Aucune chanson trouvée</p>
                                    </div>
                                ) : (
                                    filteredSongs.map(song => (
                                        <AudioPlayer
                                            key={song.id}
                                            song={song}
                                            isPlaying={playingSong && playingSong.id === song.id && isPlaying}
                                            onToggle={() => handlePlayToggle(song)}
                                            currentTime={playingSong && playingSong.id === song.id ? currentTime : 0}
                                            duration={playingSong && playingSong.id === song.id ? duration : parseDuration(song.duration)}
                                            onPlayGame={() => handlePlayGame(song.id)}
                                            onPlayVideo={() => handlePlayVideo(song)}
                                            isExpanded={expandedSong === song.id}
                                            onExpand={() => handleExpandSong(song.id)}
                                        />
                                    ))
                                )}
                            </div>
                        )}
                        {!searchQuery && (
                            <div className="space-y-3">
                                <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                                    <Icon name="BookOpen" size={18} />
                                    Choisis ton niveau
                                </h2>
                                {Object.entries(levelsData).map(([level, data]) => (
                                    <LevelCard
                                        key={level}
                                        level={level}
                                        data={data}
                                        onClick={handleLevelClick}
                                    />
                                ))}
                            </div>
                        )}
                    </div>
                )}
                {currentView === 'level' && selectedLevel && (
                    <div>
                        <div className={levelsData[selectedLevel].color + ' rounded-2xl p-5 mb-5 text-center shadow-lg border-2 ' + levelsData[selectedLevel].borderColor}>
                            <h1 className="text-2xl font-bold text-gray-800">{levelsData[selectedLevel].title}</h1>
                            <p className="text-gray-600 mt-1 text-sm font-medium">{levelsData[selectedLevel].subtitle}</p>
                            <div className="flex items-center justify-center gap-2 mt-2">
                                <Icon name="Star" size={16} className="text-yellow-500" />
                                <span className="text-xs text-gray-600 font-medium">
                                    {levelsData[selectedLevel].songs.length} chansons + {levelsData[selectedLevel].songs.length} jeux
                                </span>
                            </div>
                        </div>
                        <div className="space-y-3">
                            <h2 className="text-lg font-bold text-gray-800 mb-3">
                                🎵 Chansons
                            </h2>
                            {levelsData[selectedLevel].songs.map(song => {
                                const isHidden = expandedSong && expandedSong !== song.id;
                                const isExpanded = expandedSong === song.id;
                                if (isHidden) return null;
                                return (
                                    <AudioPlayer
                                        key={song.id}
                                        song={song}
                                        isPlaying={playingSong && playingSong.id === song.id && isPlaying}
                                        onToggle={() => handlePlayToggle(song)}
                                        currentTime={playingSong && playingSong.id === song.id ? currentTime : 0}
                                        duration={playingSong && playingSong.id === song.id ? duration : parseDuration(song.duration)}
                                        onPlayGame={() => handlePlayGame(song.id)}
                                        onPlayVideo={() => handlePlayVideo(song)}
                                        isExpanded={isExpanded}
                                        onExpand={() => handleExpandSong(song.id)}
                                    />
                                );
                            })}
                            {expandedSong && (
                                <button 
                                    onClick={() => setExpandedSong(null)}
                                    className="w-full py-3 bg-gray-100 rounded-xl text-gray-500 text-sm font-medium hover:bg-gray-200 transition-colors flex items-center justify-center gap-2"
                                >
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                                    Voir toutes les chansons
                                </button>
                            )}
                        </div>
                    </div>
                )}
            </main>
            <footer className="bg-white border-t border-gray-100 mt-10">
                <div className="max-w-2xl mx-auto px-4 py-5 text-center">
                    <p className="text-gray-500 text-sm font-medium">🎵 Chante ta Conjugaison</p>
                    <p className="text-gray-400 text-xs mt-1">Apprends en t'amusant !</p>
                </div>
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
